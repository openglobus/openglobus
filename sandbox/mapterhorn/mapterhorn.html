<html>
    <head>
        <title>OpenGlobus - Mapterhorn RGB Terrain</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../../css/og.css" type="text/css" />
        <style>
            body {
                padding: 0;
                margin: 0;
            }
        </style>
    </head>

    <body>
        <div id="globus" style="position: absolute; width: 100%; height: 100%"></div>
        <script type="module" id="og-sandbox-script">
            import { Globe, Bing, OpenStreetMap, control, MapterhornTerrain } from "../../lib/og.es.js";

            const mapterhornTerrain = new MapterhornTerrain();

            const osm = new OpenStreetMap("OpenStreetMap", {
                visibility: false
            });

            window.globe = new Globe({
                target: "globus",
                name: "Mapterhorn",
                terrain: mapterhornTerrain,
                layers: [new Bing(), osm],
                maxGridSize: 256,
                atmosphereEnabled: true,
                // resourcesSrc: "../../external/og/lib/res",
                // fontsSrc: "../../external/og/lib/res/fonts",
                //viewExtent: [7.85, 46.35, 8.25, 46.65]
            });

            globe.planet.addControl(new control.TimelineControl());
            globe.planet.addControl(new control.LayerSwitcher());
        </script>
    </body>
</html>
