<html>
    <head>
        <title>Draco loader sample</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script
            type="text/javascript"
            src="https://www.gstatic.com/draco/versioned/decoders/1.5.7/draco_decoder.js"
        ></script>
        <script src="./nestedEntities.js" type="module"></script>
        <link rel="stylesheet" href="../../css/og.css" type="text/css" />
        <style>
            body {
                padding: 0;
                margin: 0;
            }
            
            /* Стили для слайдеров */
            input[type="range"] {
                -webkit-appearance: none;
                appearance: none;
                height: 6px;
                border-radius: 3px;
                background: #444;
                outline: none;
                opacity: 0.7;
                transition: opacity 0.2s;
            }
            
            input[type="range"]:hover {
                opacity: 1;
            }
            
            input[type="range"]::-webkit-slider-thumb {
                -webkit-appearance: none;
                appearance: none;
                width: 16px;
                height: 16px;
                border-radius: 50%;
                background: #4CAF50;
                cursor: pointer;
            }
            
            input[type="range"]::-moz-range-thumb {
                width: 16px;
                height: 16px;
                border-radius: 50%;
                background: #4CAF50;
                cursor: pointer;
                border: none;
            }
        </style>
    </head>

    <body>
        <div style="width: 100%; height: 100%">
            <canvas id="frame" style="width: 100%; height: 100%"> </canvas>
        </div>
    </body>
</html>
