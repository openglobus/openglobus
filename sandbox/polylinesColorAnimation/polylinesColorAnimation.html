<html>

<head>
    <title>OpenGlobus - Earth planet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/og.css" type="text/css"/>
</head>

<body>
<div id="globus" style="width:100%;height:100%"></div>
<script type="module" id="og-sandbox-script">
    'use strict';

    import {
        math,
        Globe,
        GlobusRgbTerrain,
        Bing,
        LonLat,
        Vector,
        Entity,
        utils
    } from "../../lib/og.es.js";

    const POINTS_NUMBER = 70;

    fetch('routes.json')
        .then(res => res.json())
        .then(data => {

            let paths = [],
                colors = [],
                baseColors = [];

            let animIndex = [];

            for (let i = 0; i < data.length; i++) {
                let p = data[i],
                    dst = new LonLat(Number(p.dstAirport.lng), Number(p.dstAirport.lat)),
                    src = new LonLat(Number(p.srcAirport.lng), Number(p.srcAirport.lat));

                let path = getPath(globus.planet.ellipsoid, src, dst);

                paths.push(path.path);
                colors.push(path.colors.map((c) => c.slice()));
                baseColors.push(path.colors.map((c) => c.slice()));

                animIndex.push(math.randomi(0, POINTS_NUMBER));
            }

            let entity = new Entity({
                'polyline': {
                    'path3v': paths,
                    'pathColors': colors,
                    'thickness': 5,
                    'opacity': 0.9,
                    'color': "red",
                    'isClosed': false
                }
            });

            collection.add(entity);

            globus.planet.renderer.handler.defaultClock.setInterval(5, () => {
                let e = collection.getEntities()[0].polyline;
                let cArr = e.getPathColors();
                for (let i = 0; i < cArr.length; i++) {
                    animIndex[i]++;
                    let ind = animIndex[i];
                    if (ind > POINTS_NUMBER + 4) {
                        animIndex[i] = 0;
                        ind = 0;
                    }

                    let r = baseColors[i][0][0],
                        g = baseColors[i][0][1],
                        b = baseColors[i][0][2];

                    if (ind >= 0 && ind <= POINTS_NUMBER) {
                        e.setPointColor([r, g, b, 0.8], ind, i);
                    }
                    if (ind - 1 >= 0 && ind - 1 <= POINTS_NUMBER) {
                        e.setPointColor([r, g, b, 0.6], ind - 1, i);
                    }
                    if (ind - 2 >= 0 && ind - 2 <= POINTS_NUMBER) {
                        e.setPointColor([r, g, b, 0.3], ind - 2, i);
                    }
                    if (ind - 3 >= 0 && ind - 3 <= POINTS_NUMBER) {
                        e.setPointColor([r, g, b, 0.1], ind - 3, i);
                    }

                    const restoreIndex = ind - 4;
                    if (restoreIndex >= 0 && restoreIndex <= POINTS_NUMBER) {
                        const base = baseColors[i][restoreIndex] || baseColors[i][POINTS_NUMBER];
                        e.setPointColor([base[0], base[1], base[2], base[3]], restoreIndex, i);
                    }
                }
            });

        });

    function getPath(ell, start, end) {
        let num = POINTS_NUMBER;

        let {distance, initialAzimuth} = ell.inverse(start, end);

        let p25 = ell.getGreatCircleDestination(start, initialAzimuth, distance * 0.25),
            p75 = ell.getGreatCircleDestination(start, initialAzimuth, distance * 0.75);

        start.height = 50;
        end.height = 50;
        let h = distance / 4;
        p25.height = h;
        p75.height = h;

        let startCart = ell.lonLatToCartesian(start),
            endCart = ell.lonLatToCartesian(end),
            p25Cart = ell.lonLatToCartesian(p25),
            p75Cart = ell.lonLatToCartesian(p75);

        let path = [],
            colors = [];
        let color = [math.random(0, 1), math.random(0, 1), math.random(0, 1)];
        for (let i = 0; i <= num; i++) {
            let cn = math.bezier3v(i / num, startCart, p25Cart, p75Cart, endCart);
            path.push(cn);

            colors.push([color[0], color[1], color[2], 0.03]);
        }

        return {
            path: path,
            colors: colors
        };
    }

    var collection = new Vector("Collection", {
        'entities': []
    });

    let sat = new Bing();

    var globus = new Globe({
        target: "globus",
        name: "Earth",
        layers: [sat, collection],
        atmosphereEnabled: true,
        terrain: new GlobusRgbTerrain(),
        resourcesSrc: "../../external/og/lib/res",
        fontsSrc: "../../external/og/lib/res/fonts",
        sun: {
            stopped: true
        }
    });

    globus.planet.camera.setNearFar(100);

</script>
</body>

</html>
